<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Elves</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
    <a href="index.html" class="logo-text">Design Elves</a>
    <button id="menu-btn" class="menu-btn">+ Menu</button>
</header>

<!-- MENU -->
<nav id="fullscreen-menu" class="fullscreen-menu">
    <ul class="menu-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="work.html">WORK</a></li>
        <li><a href="contact.html">CONTACT</a></li>
    </ul>
</nav>

<main>

<!-- HERO -->
<section class="hero">
    <div class="hero-content" id="hero-content">
        <div class="hero-orb"></div>

        <h1>
            <span class="line-left">DESIGN THAT</span>
            <span class="line-right">PLAYS SMART.</span>
        </h1>
    </div>
</section>

<!-- CONTENT -->
<div class="overlap-content">

<!-- PHILOSOPHY -->
<section class="philosophy">
    <h2>WE DESIGN WITH INTENT</h2>
    <p>We remove noise and design with purpose.</p>
</section>

<!-- WORK GRID -->
<section class="home-work">

<div class="work-grid">

<!-- CARD 1 -->
<div class="work-item" data-id="1">
    <div class="work-card">
        <div class="card-inner">
            <div class="card-front">
                <img src="https://picsum.photos/800/1000?random=1">
            </div>
            <div class="card-back"></div>
        </div>
    </div>
    <div class="work-info">
        <h3>Brand Identity</h3>
        <p>Visual System</p>
    </div>
</div>

<!-- CARD 2 -->
<div class="work-item" data-id="2">
    <div class="work-card">
        <div class="card-inner">
            <div class="card-front">
                <img src="https://picsum.photos/800/1000?random=2">
            </div>
            <div class="card-back"></div>
        </div>
    </div>
    <div class="work-info">
        <h3>Digital</h3>
        <p>Web Design</p>
    </div>
</div>

<!-- CARD 3 -->
<div class="work-item" data-id="3">
    <div class="work-card">
        <div class="card-inner">
            <div class="card-front">
                <img src="https://picsum.photos/800/1000?random=3">
            </div>
            <div class="card-back"></div>
        </div>
    </div>
    <div class="work-info">
        <h3>Editorial</h3>
        <p>Print</p>
    </div>
</div>

</div>

</section>

<!-- MODAL -->
<div id="project-modal" class="modal-overlay">
    <div class="modal-backdrop"></div>

    <div id="modal-card" class="modal-card">

        <button id="modal-close" class="modal-close">✕</button>

        <div id="modal-scroll-area" class="modal-scroll-area">

            <div class="modal-hero">
                <img id="modal-img">
            </div>

            <div class="modal-content-inner">
                <h2 id="modal-title"></h2>
                <p id="modal-overview"></p>
                <p id="modal-concept"></p>
                <p id="modal-process"></p>
            </div>

        </div>
    </div>
</div>

</div>

<script src="js/main.js"></script>
</body>
</html>
